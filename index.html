<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير فرع كفر عبده</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-deep: #0f172a;
            --card-bg: #1e293b;
            --gold: #d4af37;
            --cyan: #00f2ff;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        /* لضمان ملء الصفحة بالكامل على الموبايل والـ PDF */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* حاوية مرنة تملأ الشاشة وتتناسق مع الـ PDF */
        .report-wrapper {
            width: 100%;
            max-width: 900px;
            min-height: 100vh;
            background-color: var(--bg-deep);
            padding: 40px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 25px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title-group h1 {
            font-size: clamp(1.8em, 5vw, 2.5em);
            margin: 0;
            font-weight: 900;
        }

        .title-group p {
            color: var(--gold);
            margin: 5px 0 0;
            font-size: 1.1em;
        }

        .revenue-total {
            text-align: left;
        }

        .revenue-total span { color: var(--text-dim); display: block; font-size: 0.9em; }
        .revenue-total strong { font-size: clamp(2em, 8vw, 3.5em); color: var(--cyan); line-height: 1; }

        /* شبكة الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .stat-card .label { color: var(--text-dim); font-size: 0.85em; margin-bottom: 8px; display: block; }
        .stat-card .val { font-size: 1.4em; font-weight: 900; color: white; }

        /* المحتوى الرئيسي */
        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .info-panel {
            background: rgba(255,255,255,0.02);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .panel-title {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
            border-right: 4px solid var(--gold);
            padding-right: 12px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .item-row strong { color: var(--cyan); font-size: 1.2em; }

        /* الأقسام والبارات */
        .dept-box { margin-bottom: 20px; }
        .dept-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
        .progress { height: 10px; background: #334155; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .fill { height: 100%; border-radius: 10px; }

        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9em;
        }

        /* تحسينات للتحويل لـ PDF */
        @media print {
            body { background: var(--bg-deep) !important; }
            .report-wrapper { max-width: 100% !important; padding: 20mm !important; }
        }

        /* تحسين للموبايل الصغير جداً */
        @media (max-width: 480px) {
            header { justify-content: center; text-align: center; }
            .revenue-total { text-align: center; width: 100%; }
        }
    </style>
</head>
<body>

<div class="report-wrapper">
    <header>
        <div class="title-group">
            <h1>فرع كفر عبده</h1>
            <p>تقرير الأداء (11 - 20 فبراير)</p>
        </div>
        <div class="revenue-total">
            <span>إجمالي الإيراد</span>
            <strong>263,327</strong>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="label">المتوسط اليومي</span>
            <span class="val" style="color:var(--gold)">26,332</span>
        </div>
        <div class="stat-card">
            <span class="label">نسبة التكلفة</span>
            <span class="val">43%</span>
        </div>
        <div class="stat-card">
            <span class="label">الطلبيات</span>
            <span class="val">115,649</span>
        </div>
        <div class="stat-card">
            <span class="label">الهالك (0.01%)</span>
            <span class="val" style="color:#ef4444">424</span>
        </div>
    </div>

    <div class="main-content">
        <section class="info-panel">
            <div class="panel-title">قنوات المبيعات</div>
            <div class="item-row">
                <span>داين إن (657 ع)</span>
                <strong>145,618</strong>
            </div>
            <div class="item-row">
                <span>تيك أواي (754 ع)</span>
                <strong>109,336</strong>
            </div>
        </section>

        <section class="info-panel">
            <div class="panel-title">توزيع الأقسام</div>
            <div class="dept-box">
                <div class="dept-meta"><span>البار</span><span>64%</span></div>
                <div class="progress"><div class="fill" style="width: 64%; background: var(--gold);"></div></div>
                <small style="color:var(--text-dim)">150,049 ج.م</small>
            </div>
            <div class="dept-box">
                <div class="dept-meta"><span>المطبخ</span><span>34%</span></div>
                <div class="progress"><div class="fill" style="width: 34%; background: var(--cyan);"></div></div>
                <small style="color:var(--text-dim)">79,139 ج.م</small>
            </div>
        </section>
    </div>

    <footer> 
    </footer>
</div>

</body>
</html>
