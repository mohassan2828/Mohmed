<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - Full Canvas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* السر هنا: إجبار الطابعة على إلغاء الهوامش تماماً */
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background: #000; /* خلفية سوداء لضمان ملء أي فراغ */
        }

        .page-frame {
            width: 210mm;
            height: 297mm;
            background: #fff;
            box-sizing: border-box;
            /* البرواز الأسود العريض */
            border: 25mm solid #000; 
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 10mm;
        }

        /* خط ذهبي رفيع داخل البرواز الأسود لزيادة الشياكة */
        .page-frame::after {
            content: "";
            position: absolute;
            top: 5mm;
            left: 5mm;
            right: 5mm;
            bottom: 5mm;
            border: 2px solid #c5a059;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 50px;
            color: #000;
            margin: 0;
        }

        .meta {
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
        }

        .booking-cards {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .card {
            border: 2px solid #000;
            padding: 20px;
            background: #fff;
            border-right: 15px solid #000;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .label {
            font-weight: 800;
            font-size: 22px;
            min-width: 140px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            height: 25px;
        }

        .order-area {
            margin-top: 15px;
            border: 2px solid #000;
            padding: 10px;
            min-height: 200px;
        }

        .order-title { font-weight: bold; font-size: 20px; display: block; margin-bottom: 10px; }

        .writing-line {
            height: 40px;
            border-bottom: 1px solid #ddd;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 15px;
        }

        .table-square {
            width: 80px;
            height: 50px;
            border: 4px solid #000;
            margin-right: 15px;
        }

        @media print {
            body { -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="page-frame">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta">
            <div>اليوم: ....................</div>
            <div>التاريخ: ....................</div>
        </div>
    </header>

    <div class="booking-cards">
        <div class="card">
            <div class="row"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="row"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="row"><span class="label">العدد /</span><div class="line"></div></div>
            <div class="order-area">
                <span class="order-title">الاوردر /</span>
                <div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="card">
            <div class="row"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="row"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="row"><span class="label">العدد /</span><div class="line"></div></div>
            <div class="order-area">
                <span class="order-title">الاوردر /</span>
                <div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
