<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقرير فرع  - كفر عبده</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

    :root {
      --navy: #0f172a;
      --gold: #c5a059;
      --slate: #64748b;
      --success: #059669;
      --white: #ffffff;
      --light-gray: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #e2e8f0;
      margin: 0;
      padding: 30px 15px;
      display: flex;
      justify-content: center;
      /* تحسين الطباعة */
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    .platinum-card {
      max-width: 850px;
      width: 100%;
      background: var(--white);
      border-radius: 30px;
      padding: 50px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      position: relative;
      border: 1px solid #cbd5e1;
    }

    /* هيدر اللوجو */
    .top-logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .top-logo-section img {
      width: 130px;
      height: auto;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .report-badge {
      display: inline-block;
      padding: 5px 15px;
      background: var(--light-gray);
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 50px;
      font-size: 0.8em;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* العنوان الرئيسي */
    .header-main {
      text-align: center;
      margin-bottom: 45px;
    }

    .header-main h1 {
      font-size: 2.8em;
      margin: 10px 0;
      color: var(--navy);
      font-weight: 900;
    }

    .header-main p {
      color: var(--slate);
      font-size: 1.1em;
      margin: 0;
    }

    /* كروت الأرقام */
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-box {
      background: var(--light-gray);
      padding: 25px;
      border-radius: 20px;
      border-bottom: 4px solid var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-box label { color: var(--slate); font-size: 0.9em; display: block; }
    .stat-box .val { font-size: 1.8em; font-weight: 900; color: var(--navy); }

    .revenue-hero {
      grid-column: span 2;
      background: var(--navy);
      color: white;
      text-align: center;
      padding: 30px;
      border-radius: 25px;
      border-bottom: 6px solid var(--gold);
    }

    .revenue-hero label { color: var(--gold); font-weight: 700; text-transform: uppercase; }
    .revenue-hero .price { font-size: 3.5em; font-weight: 900; color: var(--white); display: block; }

    /* تفاصيل البيانات */
    .details-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .data-list h3 {
      font-size: 1.2em;
      color: var(--navy);
      border-right: 5px solid var(--gold);
      padding-right: 15px;
      margin-bottom: 25px;
    }

    .data-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .data-item:last-child { border: none; }

    .data-item b { font-size: 1.2em; color: var(--navy); }
    .data-item small { color: var(--slate); font-size: 0.8em; display: block; }

    /* البارات */
    .bar-group { margin-bottom: 20px; }
    .bar-info { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px; font-size: 0.9em; }
    .bar-container { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
    .bar-inner { height: 100%; border-radius: 10px; }

    footer {
      margin-top: 50px;
      text-align: center;
      border-top: 1px solid #f1f5f9;
      padding-top: 25px;
      color: var(--slate);
      font-size: 0.85em;
    }

    @media (max-width: 600px) {
      .grid-stats, .details-section { grid-template-columns: 1fr; }
      .revenue-hero { grid-column: span 1; }
      .platinum-card { padding: 30px 20px; }
    }

    @media print {
      body { background: white; padding: 0; }
      .platinum-card { border: none; box-shadow: none; width: 100%; }
    }
  </style>
</head>
<body>

<div class="platinum-card">
  <div class="top-logo-section">
    <img src="https://image2url.com/r2/default/images/1771712675351-83aed5ed-0de5-44e3-81ef-e8cabd48a665.jpg" alt="Logo">
    <br>
    <span class="report-badge">REPORT 2026</span>
  </div>

  <header class="header-main">
    <h1>كفر عبده</h1>
    <p>تقرير أداء الفترة من 11 إلى 20 فبراير</p>
  </header>

  <div class="grid-stats">
    <div class="revenue-hero">
      <label>إجمالي الإيراد المحقق</label>
      <span class="price">263,327</span>
    </div>
    
    <div class="stat-box">
      <div><label>المتوسط اليومي</label><span class="val">26,332</span></div>
      <div style="color: var(--gold); font-size: 1.5em;">📅</div>
    </div>

    <div class="stat-box">
      <div><label>نسبة التكلفة</label><span class="val">43%</span></div>
      <div style="color: var(--gold); font-size: 1.5em;">📉</div>
    </div>
  </div>

  <div class="details-section">
    <section class="data-list">
      <h3>📈 قنوات المبيعات</h3>
      <div class="data-item">
        <div><b>الداين إن</b><small>657 عملية</small></div>
        <div style="text-align: left;"><b>145,618</b><small>DINE-IN</small></div>
      </div>
      <div class="data-item">
        <div><b>تيك أواي</b><small>754 عملية</small></div>
        <div style="text-align: left;"><b>109,336</b><small>TAKEAWAY</small></div>
      </div>
      <div style="margin-top:20px; color: #ef4444; font-size: 0.9em; font-weight: bold;">
        الهالك: 424 ج.م (0.01%)
      </div>
    </section>

    <section class="data-list">
      <h3>👨‍🍳 حصة الأقسام</h3>
      <div class="bar-group">
        <div class="bar-info"><span>البار</span><span>64%</span></div>
        <div class="bar-container"><div class="bar-inner" style="width: 64%; background: var(--navy);"></div></div>
      </div>
      <div class="bar-group">
        <div class="bar-info"><span>المطبخ</span><span>34%</span></div>
        <div class="bar-container"><div class="bar-inner" style="width: 34%; background: var(--gold);"></div></div>
      </div>
      <div class="bar-group">
        <div class="bar-info"><span>الديزارت</span><span>2%</span></div>
        <div class="bar-container"><div class="bar-inner" style="width: 2%; background: var(--slate);"></div></div>
      </div>
    </section>
  </div>

  <footer>
    
  </footer>
</div>

</body>
</html>
