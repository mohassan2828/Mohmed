<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تصميم حجوزات رمضان الجرافيكي الخرافي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&family=Tajawal:wght@400;700;900&display=swap');

        /* تصفير الهوامش لضمان ملء الورقة */
        @page { size: A4; margin: 0; }

        body {
            margin: 0; padding: 0;
            width: 210mm; height: 297mm;
            background-color: #000; /* الحواف السوداء العريضة المدمجة */
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            -webkit-print-color-adjust: exact;
        }

        /* الحاوية الرئيسية تمتد لعرض الورقة */
        .graphic-canvas {
            width: 202mm; height: 289mm;
            background: #fff;
            padding: 10px 30px;
            box-sizing: border-box;
            border: 2px solid #c5a059; /* إطار ذهبي رفيع للشياكة */
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* زخرفة خلفية هندسية خفيفة جداً */
        .graphic-canvas::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.05; pointer-events: none;
        }

        header {
            text-align: center; margin-bottom: 5px; position: relative;
            border-bottom: 3px double #c5a059; padding-bottom: 5px; z-index: 10;
        }

        header h1 {
            font-family: 'Reem Kufi', sans-serif; font-size: 45px;
            color: #1a1a1a; margin: 0; text-shadow: 1px 1px 2px #c5a059;
        }

        .header-meta {
            display: flex; justify-content: center; gap: 40px;
            font-weight: bold; font-size: 19px; color: #555; margin-top: 5px;
        }

        .header-meta span { color: #ddd; margin-right: 5px; }

        .cards-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: space-between; padding: 5px 0; z-index: 10;
        }

        /* تصميم الكارت الجرافيكي المائل */
        .modern- منشور {
            background: #ffffff;
            border: 2px solid #eee;
            border-right: 18px solid #000; /* الشريط الأسود الجانبي الفخم */
            padding: 10px 20px;
            height: 30%; /* لضمان استيعاب 3 كروت في ورقة واحدة */
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden;
        }

        /* رسمة جرافيكية مائلة في خلفية كل كارت بالـ CSS */
        . منشور::after {
            content: ""; position: absolute; top: 0; right: 0; width: 40%; height: 100%;
            background: linear-gradient(135deg, transparent 70%, rgba(197, 160, 89, 0.1) 70%, rgba(197, 160, 89, 0.1) 80%, transparent 80%);
            pointer-events: none;
        }

        /* الأيقونات الـ Vector المرسومة */
        .vector-label {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 18px; color: #000;
        }

        .field-row { display: flex; align-items: center; margin-bottom: 5px; }
        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .line-fill {
            flex-grow: 1; border-bottom: 2px solid #000; height: 18px;
            background: linear-gradient(to left, #fff, #f9f9f9);
        }

        /* رسم الأيقونات بالـ CSS */
        .icon { width: 22px; height: 22px; display: inline-block; position: relative; }
        
        /* أيقونة الاسم - شخص مبسط */
        .icon-user {
            border: 2px solid #c5a059; border-radius: 50%;
            height: 12px; width: 12px; left: 5px; top: -1px;
        }
        .icon-user::after {
            content: ""; position: absolute; bottom: -8px; left: -4px;
            width: 20px; height: 10px; border: 2px solid #c5a059;
            border-radius: 10px 10px 0 0;
        }

        /* أيقونة الموبايل - سماعة مبسطة */
        .icon-phone {
            width: 18px; height: 22px; border: 2px solid #c5a059;
            border-radius: 4px; left: 2px;
        }
        .icon-phone::after {
            content: ""; position: absolute; bottom: 2px; left: 4px;
            width: 10px; height: 2px; background: #c5a059;
        }

        /* أيقونة العدد - مجموعة أشخاص مبسطة */
        .icon-group {
            width: 25px; height: 22px;
            border-bottom: 2px solid #c5a059;
        }
        .icon-group::before {
            content: "👥"; position: absolute; font-size: 16px; color: #c5a059;
            top: -2px; left: -2px;
        }
        .icon-group::after {
            content: ""; position: absolute; font-size: 16px; color: #c5a059;
            top: -2px; left: 10px;
        }

        /* مساحة الأوردر الجرافيكية المدمجة للـ 3 كروت */
        .order-zone {
            border: 2px solid #c5a059; background: #fffdfa;
            padding: 8px; border-radius: 4px; margin: 5px 0;
            position: relative; height: 60px;
        }

        .order-tag {
            position: absolute; top: -8px; right: 15px;
            background: #c5a059; color: #fff; padding: 2px 10px;
            font-size: 13px; border-radius: 10px; font-weight: bold;
        }

        .order-lines div { height: 28px; border-bottom: 1px dashed #e0e0e0; }

        .footer {
            display: flex; justify-content: flex-end; align-items: center;
        }

        .table-badge {
            display: flex; align-items: center; gap: 8px;
            font-weight: 900; font-size: 19px; color: #000;
        }

        .table-input {
            width: 70px; height: 35px; border: 3px solid #000;
            background: #fff; position: relative;
        }

        /* رسم زخرفة في زاوية كل كارت بالـ CSS */
        .card-corner-pattern {
            position: absolute; top: 0; left: 0; width: 15px; height: 15px;
            border-top: 2px solid #c5a059; border-left: 2px solid #c5a059;
            border-radius: 2px 0 0 0; opacity: 0.2;
        }

    </style>
</head>
<body>

<div class="graphic-canvas">

    </div>
</div>
