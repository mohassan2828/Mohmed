<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - 3 كروت كاملة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background-color: #000;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-print-color-adjust: exact;
        }

        .content-sheet {
            width: 200mm;
            height: 287mm;
            background: white;
            padding: 10px 30px;
            box-sizing: border-box;
            border: 2px solid #c5a059;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 38px;
            color: #000;
            margin: 0;
        }

        .meta {
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            font-weight: bold;
        }

        .cards-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px 0;
        }

        .booking-card {
            border: 1px solid #000;
            padding: 10px 20px;
            border-right: 12px solid #000;
            background: #fff;
            height: 29%; /* لضمان استيعاب 3 كروت في صفحة واحدة */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .field-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .field {
            display: flex;
            align-items: center;
        }

        .label {
            font-weight: 800;
            font-size: 17px;
            color: #000;
            min-width: 90px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 1px solid #000;
            height: 18px;
        }

        .order-zone {
            border: 1px solid #000;
            padding: 8px;
            height: 70px; /* مساحة أوردر ملمومة للـ 3 كروت */
            margin: 5px 0;
        }

        .order-title { font-weight: bold; font-size: 16px; margin-bottom: 2px; display: block; }
        .dots { height: 28px; border-bottom: 1px dashed #eee; }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .table-square {
            width: 70px;
            height: 35px;
            border: 3px solid #000;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="content-sheet">
    <header>
        <h1>حجوزات رمضان</h1>
        <div class="meta">
            <div>اليوم: ......................</div>
            <div>التاريخ: ......................</div>
        </div>
    </header>

    <div class="cards-area">
        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field-group">
                <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
                <div class="field"><span class="label">العدد /</span><div class="line"></div></div>
            </div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label" style="min-width:auto">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field-group">
                <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
                <div class="field"><span class="label">العدد /</span><div class="line"></div></div>
            </div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label" style="min-width:auto">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field-group">
                <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
                <div class="field"><span class="label">العدد /</span><div class="line"></div></div>
            </div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label" style="min-width:auto">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
