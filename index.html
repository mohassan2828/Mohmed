<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دفتر حجوزات رمضان - الطباعة الكاملة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* إجبار المتصفح على مقاس A4 حقيقي */
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background-color: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            display: block;
        }

        /* الحاوية الرئيسية تمتد لعرض الورقة بالكامل */
        .page-container {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            border: 22px solid #000000; /* الحواف السوداء العريضة */
            outline: 2px solid #c5a059;
            outline-offset: -10px;
            padding: 30px 40px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px solid #000;
            padding-bottom: 15px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 52px;
            color: #000;
            margin: 0;
        }

        .meta-line {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .booking-cards {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* توزيع الكارتين على طول الورقة */
            padding: 10px 0;
        }

        .card {
            border: 1px solid #000;
            padding: 25px;
            background: #fff;
            border-right: 15px solid #000;
            position: relative;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .label {
            font-weight: 800;
            font-size: 22px;
            color: #000;
            min-width: 150px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            height: 25px;
        }

        .order-box {
            margin-top: 20px;
            border: 2px solid #000;
            padding: 15px;
            min-height: 220px; /* مساحة أوردر ضخمة */
        }

        .order-title {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
            display: block;
        }

        .writing-line {
            height: 45px;
            border-bottom: 1px solid #ccc;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 20px;
        }

        .table-square {
            width: 100px;
            height: 60px;
            border: 4px solid #000;
            margin-right: 15px;
        }

        /* تحسينات الطباعة */
        @media print {
            .page-container {
                border-width: 22px !important;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="page-container">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta-line">
            <div>اليوم: ......................</div>
            <div>التاريخ: ......................</div>
        </div>
    </header>

    <div class="booking-cards">
        <div class="card">
            <div class="row">
                <span class="label">الاســـــم /</span>
                <div class="line"></div>
            </div>
            <div class="row">
                <span class="label">رقم الموبايل /</span>
                <div class="line"></div>
            </div>
            <div class="row">
                <span class="label">عدد الأفراد /</span>
                <div class="line"></div>
            </div>

            <div class="order-box">
                <span class="order-title">تـفاصيل الاوردر /</span>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
            </div>

            <div class="footer">
                <span class="label">رقم الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <span class="label">الاســـــم /</span>
                <div class="line"></div>
            </div>
            <div class="row">
                <span class="label">رقم الموبايل /</span>
                <div class="line"></div>
            </div>
            <div class="row">
                <span class="label">عدد الأفراد /</span>
                <div class="line"></div>
            </div>

            <div class="order-box">
                <span class="order-title">تـفاصيل الاوردر /</span>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
                <div class="writing-line"></div>
            </div>

            <div class="footer">
                <span class="label">رقم الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
