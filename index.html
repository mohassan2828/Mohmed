<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - مساحة طلبات واسعة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@500;800&display=swap');

        @page { size: A4; margin: 0; }

        body {
            margin: 0; padding: 0;
            width: 210mm; height: 297mm;
            background-color: #000;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            -webkit-print-color-adjust: exact;
        }

        .main-canvas {
            width: 202mm; height: 290mm;
            background: #fff;
            padding: 10px 25px;
            box-sizing: border-box;
            border: 2px solid #c5a059;
            display: flex; flex-direction: column;
        }

        header {
            text-align: center;
            border-bottom: 3px double #000;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        header h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 45px;
            margin: 0;
            color: #000;
        }

        .header-meta {
            display: flex; justify-content: space-around;
            font-weight: 800; font-size: 18px; color: #555;
        }

        .cards-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pro-card {
            height: 30%; /* استغلال مساحة أكبر لكل كارت */
            border: 2px solid #000;
            border-right: 20px solid #000;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #fff;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.8fr;
            gap: 15px;
            margin-bottom: 10px;
        }

        .input-item {
            border-bottom: 2px solid #eee;
        }

        .input-item label {
            font-size: 13px;
            font-weight: 800;
            color: #c5a059;
            display: block;
        }

        .input-item div { height: 22px; }

        /* منطقة الطلبات الكبيرة */
        .order-mega-zone {
            flex-grow: 1; /* تأخذ كل المساحة المتبقية في الكارت */
            border: 1.5px solid #000;
            background: #fdfdfd;
            margin: 5px 0;
            position: relative;
            padding: 8px;
        }

        .order-label {
            position: absolute;
            top: -12px; right: 15px;
            background: #000; color: #fff;
            padding: 2px 15px;
            font-size: 12px; font-weight: bold;
            border-radius: 5px;
        }

        .writing-lines {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .writing-lines div {
            flex-grow: 1;
            border-bottom: 1px dashed #ccc;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .table-tag {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            font-size: 18px;
        }

        .table-square {
            width: 70px;
            height: 38px;
            border: 3px solid #c5a059;
            background: #fff;
        }

        .ramadan-icon { font-size: 20px; color: #c5a059; }

    </style>
</head>
<body>

<div class="main-canvas">
    <header>

            <div class="order-mega-zone">

            </div>

</body>
</html>
