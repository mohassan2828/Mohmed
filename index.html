<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - نسخة الطباعة المضمونة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background-color: #000;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-print-color-adjust: exact;
        }

        .content-sheet {
            width: 195mm; /* عرض مريح للورقة */
            height: 282mm; /* طول أقصر شوية علشان نضمن عدم الهروب لصفحة تانية */
            background: white;
            padding: 15px 35px;
            box-sizing: border-box;
            border: 2px solid #c5a059;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 45px;
            color: #000;
            margin: 0;
        }

        .meta {
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        .cards-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* توزيع احترافي */
            padding-bottom: 10px;
        }

        .booking-card {
            border: 1px solid #000;
            padding: 15px 25px;
            border-right: 15px solid #000;
            background: #fff;
            height: 44%; /* تحديد طول الكارت لضمان وجوده في صفحة واحدة */
        }

        .field {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .label {
            font-weight: 800;
            font-size: 19px;
            min-width: 130px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            height: 20px;
        }

        .order-zone {
            margin-top: 10px;
            border: 2px solid #000;
            padding: 10px;
            height: 140px; /* مساحة أوردر ملمومة ومظبوطة */
        }

        .order-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; display: block; }
        .dots { height: 35px; border-bottom: 1px dashed #ccc; }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 10px;
        }

        .table-square {
            width: 80px;
            height: 45px;
            border: 4px solid #000;
            margin-right: 15px;
        }
    </style>
</head>
<body>

<div class="content-sheet">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta">
            <div>اليوم: ......................</div>
            <div>التاريخ: ......................</div>
        </div>
    </header>

    <div class="cards-area">
        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
