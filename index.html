<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دفتر حجوزات رمضان - نسخة الطباعة النهائية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* إجبار المقاس على A4 حقيقي وإلغاء هوامش المتصفح */
        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background-color: #000; /* الحواف السوداء هي خلفية الصفحة */
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* الورقة البيضاء اللي جواها الكلام */
        .content-sheet {
            width: 190mm; /* عرض عريض جداً */
            height: 275mm; /* طول مالي الصفحة */
            background: white;
            padding: 25px 40px;
            box-sizing: border-box;
            border: 2px solid #c5a059; /* برواز ذهبي رفيع */
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px solid #000;
            padding-bottom: 15px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 50px;
            color: #000;
            margin: 0;
        }

        .meta {
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
        }

        .cards-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .booking-card {
            border: 1px solid #000;
            padding: 25px;
            border-right: 18px solid #000; /* شريط جانبي أسود فخم */
            background: #fff;
        }

        .field {
            display: flex;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .label {
            font-weight: 800;
            font-size: 22px;
            min-width: 150px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            height: 25px;
        }

        .order-zone {
            margin-top: 20px;
            border: 2px solid #000;
            padding: 15px;
            min-height: 200px;
        }

        .order-title { font-weight: bold; font-size: 20px; margin-bottom: 10px; display: block; }
        .dots { height: 40px; border-bottom: 1px dashed #ccc; }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 20px;
        }

        .table-square {
            width: 90px;
            height: 60px;
            border: 4px solid #000;
            margin-right: 15px;
        }
    </style>
</head>
<body>

<div class="content-sheet">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta">
            <div>اليوم: ......................</div>
            <div>التاريخ: ......................</div>
        </div>
    </header>

    <div class="cards-area">
        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div><div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="booking-card">
            <div class="field"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="field"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="order-zone">
                <span class="order-title">الاوردر /</span>
                <div class="dots"></div><div class="dots"></div><div class="dots"></div><div class="dots"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
