<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير فرع كفر عبده - تصدير PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --neon-cyan: #00f2ff;
            --neon-purple: #bd00ff;
            --neon-amber: #ffaa00;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --red: #ef4444;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        /* تنسيق زر التحميل */
        .controls-area {
            max-width: 1100px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: flex-end;
        }

        .btn-download {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        /* حاوية التقرير التي سيتم تصديرها */
        #report-to-export {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            margin: 0 auto;
        }

        .header-premium {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 50px;
            flex-wrap: wrap;
            gap: 30px;
        }

        .live-indicator {
            font-size: 0.7em;
            background: var(--red);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
            font-weight: bold;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .title-block h1 { font-size: 2.5em; margin: 0; font-weight: 900; }
        .city-tag { color: var(--neon-cyan); font-size: 0.5em; border: 1px solid; padding: 2px 8px; border-radius: 6px; margin-right: 10px; }

        .revenue-mega-card { text-align: left; }
        .revenue-mega-card label { color: var(--text-dim); }
        .revenue-mega-card .amount { font-size: 3.5em; font-weight: 900; color: var(--neon-cyan); line-height: 1; margin-top: 10px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value { font-size: 2em; font-weight: 900; margin-bottom: 5px; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .content-card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 30px; }
        .content-card h3 { border-right: 4px solid var(--neon-cyan); padding-right: 15px; margin-top: 0; }

        .channel-box {
            background: rgba(255,255,255,0.02);
            padding: 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-track { height: 10px; background: #334155; border-radius: 20px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 20px; }
        .bar-color { background: var(--neon-purple); }
        .kitchen-color { background: var(--neon-cyan); }
        .desert-color { background: var(--neon-amber); }

        .dash-footer { text-align: center; margin-top: 50px; color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px; }

        /* تعديلات خاصة للطباعة لضمان ظهور الألوان */
        @media print {
            body { background: var(--dark-bg) !important; -webkit-print-color-adjust: exact; }
            .btn-download { display: none; }
        }
    </style>
</head>
<body>

    <div class="controls-area">
        <button class="btn-download" onclick="generatePDF()">
            <span>💾 تحميل التقرير PDF</span>
        </button>
    </div>

    <div id="report-to-export">
        <div class="dashboard-night">
            <header class="header-premium">
                <div class="title-block">
                    <div class="live-indicator">  </div>
                    <h1>فرع كفر عبده <span class="city-tag">تقرير رسمي</span></h1>
                    <p class="date-range">الفترة: 11 - 20 فبراير 2025</p>
                </div>
                <div class="revenue-mega-card">
                    <label>الإيراد الإجمالي</label>
                    <div class="amount">263,327</div>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">المتوسط اليومي</div>
                    <div class="stat-value">26,332</div>
                </div>
                <div class="stat-item" style="border-color: var(--neon-amber)">
                    <div class="stat-label">نسبة التكلفة</div>
                    <div class="stat-value">43%</div>
                </div>
                <div class="stat-item" style="border-color: var(--neon-purple)">
                    <div class="stat-label">الطلبيات</div>
                    <div class="stat-value">115,649</div>
                </div>
            </div>

            <div class="main-content">
                <section class="content-card">
                    <h3>📈 قنوات البيع</h3>
                    <div class="channel-box">
                        <span>الداين إن</span>
                        <strong style="color:var(--neon-cyan)">145,618</strong>
                    </div>
                    <div class="channel-box">
                        <span>التيك أواي</span>
                        <strong style="color:var(--neon-cyan)">109,336</strong>
                    </div>
                </section>

                <section class="content-card">
                    <h3>👨‍🍳 الأقسام</h3>
                    <div class="dept-row">
                        <div style="display:flex; justify-content:space-between"><span>البار</span><span>64%</span></div>
                        <div class="progress-track"><div class="progress-fill bar-color" style="width: 64%"></div></div>
                    </div>
                    <div class="dept-row">
                        <div style="display:flex; justify-content:space-between"><span>المطبخ</span><span>34%</span></div>
                        <div class="progress-track"><div class="progress-fill kitchen-color" style="width: 34%"></div></div>
                    </div>
                </section>
            </div>

            <footer class="dash-footer">
                    فرع كفر عبده -   ✨
            </footer>
        </div>
    </div>

    <script>
        function generatePDF() {
            // اختيار العنصر المطلوب تصديره
            const element = document.getElementById('report-to-export');
            
            // إعدادات التصدير لضمان الجودة والألوان
            const opt = {
                margin:       0.2,
                filename:     'Report_Kafr_Abdou_Feb.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#0f172a' // نضمن خلفية الـ PDF غامقة
                },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            // تشغيل التحويل
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
