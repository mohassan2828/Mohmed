<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير فرع كفر عبده - فبراير</title>
    <style>
        /* استيراد الخط العربي */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --neon-cyan: #00f2ff;
            --neon-purple: #bd00ff;
            --neon-amber: #ffaa00;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        /* تنسيقات الصفحة الأساسية */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            /* لضمان ثبات الألوان عند التحويل لـ PDF */
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .dashboard-container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 35px;
            padding: 45px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* الرأس - Header */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title-group h1 {
            font-size: 2.6em;
            margin: 0;
            font-weight: 900;
            color: var(--text-main);
        }

        .title-group p {
            color: var(--neon-cyan);
            font-size: 1.1em;
            margin-top: 5px;
            font-weight: bold;
        }

        .revenue-badge {
            text-align: left;
        }

        .revenue-badge label {
            display: block;
            color: var(--text-dim);
            font-size: 0.9em;
        }

        .revenue-badge .val {
            font-size: 3.5em;
            font-weight: 900;
            color: var(--neon-cyan);
            line-height: 1;
        }

        /* الكروت العلوية */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 25px;
            border-radius: 25px;
            border-right: 5px solid transparent;
        }

        .stat-card.blue { border-color: var(--neon-cyan); }
        .stat-card.amber { border-color: var(--neon-amber); }
        .stat-card.purple { border-color: var(--neon-purple); }

        .stat-card label { display: block; color: var(--text-dim); margin-bottom: 10px; font-size: 0.9em; }
        .stat-card .num { font-size: 1.8em; font-weight: 900; }

        /* المحتوى الرئيسي */
        .grid-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .data-card {
            background: rgba(0,0,0,0.15);
            padding: 30px;
            border-radius: 25px;
        }

        .data-card h3 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.2em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        /* قنوات البيع */
        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .channel-item strong { color: var(--neon-cyan); font-size: 1.3em; }
        .ops-badge { font-size: 0.75em; background: #334155; padding: 4px 10px; border-radius: 8px; }

        /* الأقسام */
        .dept-row { margin-bottom: 20px; }
        .dept-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
        .progress-bar { height: 10px; background: #334155; border-radius: 10px; overflow: hidden; }
        .fill { height: 100%; border-radius: 10px; }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-size: 0.85em;
        }

        /* إعدادات خاصة لتحويل PDF (مواقع مثل iLovePDF) */
        @media print {
            body { background-color: var(--dark-bg) !important; }
            .dashboard-container { box-shadow: none !important; border: 1px solid #334155 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        /* للموبايل */
        @media (max-width: 768px) {
            .stats-row, .grid-content { grid-template-columns: 1fr; }
            .header-section { text-align: center; justify-content: center; }
            .revenue-badge { text-align: center; width: 100%; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="header-section">
        <div class="title-group">
            <h1>فرع كفر عبده</h1>
            <p>تقرير الفترة من 11 إلى 20 فبراير</p>
        </div>
        <div class="revenue-badge">
            <label>إجمالي الإيراد</label>
            <div class="val">263,327</div>
        </div>
    </header>

    <div class="stats-row">
        <div class="stat-card blue">
            <label>المتوسط اليومي</label>
            <div class="num">26,332</div>
        </div>
        <div class="stat-card amber">
            <label>نسبة التكلفة</label>
            <div class="num">43%</div>
        </div>
        <div class="stat-card purple">
            <label>إجمالي الطلبيات</label>
            <div class="num">115,649</div>
        </div>
    </div>

    <div class="grid-content">
        <section class="data-card">
            <h3>📈 تحليل قنوات البيع</h3>
            <div class="channel-item">
                <div><span>داين إن</span></div>
                <div><strong>145,618</strong> <span class="ops-badge">657 عملية</span></div>
            </div>
            <div class="channel-item">
                <div><span>تيك أواي</span></div>
                <div><strong>109,336</strong> <span class="ops-badge">754 عملية</span></div>
            </div>
        </section>

        <section class="data-card">
            <h3>👨‍🍳 أداء الأقسام</h3>
            <div class="dept-row">
                <div class="dept-info"><span>قسم البار</span><span>64%</span></div>
                <div class="progress-bar"><div class="fill" style="width: 64%; background: var(--neon-purple);"></div></div>
            </div>
            <div class="dept-row">
                <div class="dept-info"><span>قسم المطبخ</span><span>34%</span></div>
                <div class="progress-bar"><div class="fill" style="width: 34%; background: var(--neon-cyan);"></div></div>
            </div>
            <div class="dept-row">
                <div class="dept-info"><span>قسم الحلويات</span><span>2%</span></div>
                <div class="progress-bar"><div class="fill" style="width: 2%; background: var(--neon-amber);"></div></div>
            </div>
        </section>
    </div>

    <footer class="footer">
        تقرير إداري  |    ✨
    </footer>
</div>

</body>
</html>
