<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - النسخة النهائية المظبوطة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* تصفير كل الهوامش وإجبار المتصفح على مقاس A4 */
        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 210mm;
            height: 297mm;
            background-color: #000; /* الحواف السوداء هنا هي خلفية الصفحة */
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الحاوية البيضاء هي اللي جواها الشغل */
        .white-sheet {
            width: 180mm; /* عرض الصفحة الداخلي */
            height: 260mm; /* طول الصفحة الداخلي */
            background: white;
            padding: 20px 30px;
            box-sizing: border-box;
            border: 2px solid #c5a059; /* إطار ذهبي رفيع للشياكة */
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #000;
            padding-bottom: 15px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 48px;
            color: #000;
            margin: 0;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        .booking-cards {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .card {
            border: 1px solid #000;
            padding: 20px;
            background: #fff;
            border-right: 12px solid #000;
        }

        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .label {
            font-weight: 800;
            font-size: 20px;
            min-width: 140px;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            height: 25px;
        }

        .order-area {
            margin-top: 15px;
            border: 2px solid #000;
            padding: 10px;
            min-height: 180px;
        }

        .order-title { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }

        .writing-line {
            height: 40px;
            border-bottom: 1px solid #eee;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 15px;
        }

        .table-square {
            width: 80px;
            height: 50px;
            border: 4px solid #000;
            margin-right: 15px;
        }

        @media print {
            body { -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="white-sheet">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta-row">
            <div>اليوم: ....................</div>
            <div>التاريخ: ....................</div>
        </div>
    </header>

    <div class="booking-cards">
        <div class="card">
            <div class="input-row"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="input-row"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="input-row"><span class="label">العدد /</span><div class="line"></div></div>
            <div class="order-area">
                <span class="order-title">الاوردر /</span>
                <div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>

        <div class="card">
            <div class="input-row"><span class="label">الاســـــم /</span><div class="line"></div></div>
            <div class="input-row"><span class="label">الموبايل /</span><div class="line"></div></div>
            <div class="input-row"><span class="label">العدد /</span><div class="line"></div></div>
            <div class="order-area">
                <span class="order-title">الاوردر /</span>
                <div class="writing-line"></div><div class="writing-line"></div><div class="writing-line"></div>
            </div>
            <div class="footer">
                <span class="label">الترابيزة //</span>
                <div class="table-square"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
