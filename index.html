<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقرير فرع كفر عبده - Bruxie's</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

    :root {
      --primary-dark: #1e293b;
      --accent-gold: #b59410;
      --success-green: #059669;
      --soft-bg: #f8fafc;
      --border-color: #e2e8f0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #dee2e6;
      margin: 0;
      padding: 20px 10px;
      display: flex;
      justify-content: center;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    .report-card {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      position: relative;
    }

    /* تنسيق اللوجو */
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      max-width: 150px; /* المقاس المثالي للوجو */
      height: auto;
      border-radius: 10px;
    }

    /* Header */
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid var(--primary-dark);
      padding-bottom: 20px;
      margin-bottom: 35px;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 2.2em;
      color: var(--primary-dark);
      font-weight: 900;
    }

    .brand-title p {
      margin: 5px 0 0;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .main-total { text-align: left; }
    .main-total label { font-size: 0.85em; color: #64748b; display: block; }
    .main-total .price { font-size: 3em; font-weight: 900; color: var(--success-green); line-height: 1; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 35px;
    }

    .mini-card {
      background: var(--soft-bg);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border-color);
    }

    .mini-card .label { font-size: 0.8em; color: #64748b; display: block; margin-bottom: 5px; }
    .mini-card .num { font-size: 1.3em; font-weight: 900; color: var(--primary-dark); }

    /* Content Layout */
    .content-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 25px;
    }

    .section-box {
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 20px;
    }

    .section-box h3 {
      margin-top: 0;
      font-size: 1.1em;
      border-right: 4px solid var(--accent-gold);
      padding-right: 10px;
      margin-bottom: 20px;
    }

    .channel-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border-color);
    }

    .ch-val { text-align: left; }
    .ch-val .amt { display: block; font-weight: 900; font-size: 1.2em; }
    .ch-val .count { font-size: 0.75em; color: #64748b; }

    .dept-row { margin-bottom: 18px; }
    .dept-meta { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 5px; }
    .bar-bg { height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 10px; }

    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      text-align: center;
      color: #94a3b8;
      font-size: 0.85em;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content-layout { grid-template-columns: 1fr; }
      .header-flex { flex-direction: column; text-align: center; align-items: center; }
      .main-total { margin-top: 20px; text-align: center; }
    }

    @media print {
      body { background: white; padding: 0; }
      .report-card { border: none; box-shadow: none; width: 100%; }
    }
  </style>
</head>
<body>

<div class="report-card">
  <div class="logo-container">
    <img src="https://image2url.com/r2/default/images/1771712675351-83aed5ed-0de5-44e3-81ef-e8cabd48a665.jpg" alt="Bruxie's Logo">
  </div>

  <header class="header-flex">
    <div class="brand-title">
      <h1>فرع كفر عبده</h1>
      <p>تقرير الأداء (11 - 20 فبراير)</p>
    </div>
    <div class="main-total">
      <label>إجمالي الإيراد الصافي</label>
      <div class="price">263,327</div>
    </div>
  </header>

  <div class="stats-grid">
    <div class="mini-card">
      <span class="label">المتوسط اليومي</span>
      <span class="num">26,332</span>
    </div>
    <div class="mini-card">
      <span class="label">نسبة التكلفة</span>
      <span class="num">43%</span>
    </div>
    <div class="mini-card">
      <span class="label">المشتريات</span>
      <span class="num">115,649</span>
    </div>
    <div class="mini-card">
      <span class="label">الهالك (%)</span>
      <span class="num" style="color: #ef4444;">0.01%</span>
    </div>
  </div>

  <div class="content-layout">
    <section class="section-box">
      <h3>📈 قنوات البيع</h3>
      <div class="channel-row">
        <div><b>الداين إن</b><br><small>Dine-in</small></div>
        <div class="ch-val"><span class="amt">145,618</span><span class="count">657 عملية</span></div>
      </div>
      <div class="channel-row">
        <div><b>تيك أواي</b><br><small>Takeaway</small></div>
        <div class="ch-val"><span class="amt">109,336</span><span class="count">754 عملية</span></div>
      </div>
      <div style="margin-top: 15px; padding: 10px; background: #fff5f5; border-radius: 8px; color: #b91c1c; font-size: 0.85em;">
        قيمة الهالك المسجلة: 424 ج.م
      </div>
    </section>

    <section class="section-box">
      <h3>👨‍🍳 أداء الأقسام</h3>
      <div class="dept-row">
        <div class="dept-meta"><span>البار</span><span>64%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 64%; background: var(--primary-dark);"></div></div>
      </div>
      <div class="dept-row">
        <div class="dept-meta"><span>المطبخ</span><span>34%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 34%; background: var(--accent-gold);"></div></div>
      </div>
      <div class="dept-row">
        <div class="dept-meta"><span>الديزارت</span><span>2%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: 2%; background: #cbd5e1;"></div></div>
      </div>
    </section>
  </div>

  <footer> ✨
  </footer>
</div>

</body>
</html>
