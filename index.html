<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجوزات رمضان - التصميم الاحترافي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@500;800&family=Aref+Ruqaa:wght@700&display=swap');

        @page { size: A4; margin: 0; }

        body {
            margin: 0; padding: 0;
            width: 210mm; height: 297mm;
            background-color: #000; /* الحواف السوداء العريضة */
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            -webkit-print-color-adjust: exact;
        }

        .paper-canvas {
            width: 204mm; height: 291mm;
            background: #fff;
            padding: 20px 35px;
            box-sizing: border-box;
            border: 1px solid #d4af37;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* لمسة زخرفية إسلامية في الأركان */
        .paper-canvas::before {
            content: "☪"; position: absolute; top: 10px; right: 10px; font-size: 30px; color: #d4af37; opacity: 0.2;
        }

        header {
            text-align: center; margin-bottom: 15px;
            border-bottom: 5px double #000; padding-bottom: 10px;
        }

        header h1 {
            font-family: 'Aref Ruqaa', serif; font-size: 55px;
            color: #000; margin: 0; line-height: 1;
        }

        .header-info {
            display: flex; justify-content: center; gap: 50px;
            font-size: 20px; font-weight: 800; color: #333; margin-top: 10px;
        }

        .cards-container {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: space-around; padding: 10px 0;
        }

        /* كارت احترافي بتصميم "البلوك" */
        .pro-card {
            height: 28%;
            border: 2px solid #000;
            display: grid;
            grid-template-columns: 80px 1fr; /* عمود جانبي أسود */
            position: relative;
            background: #fff;
            box-shadow: 10px 10px 0px #f0f0f0;
        }

        .side-bar {
            background: #000;
            display: flex; justify-content: center; align-items: center;
            color: #d4af37; writing-mode: vertical-rl;
            font-weight: 800; font-size: 24px; letter-spacing: 2px;
        }

        .card-body {
            padding: 15px 25px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .main-fields {
            display: grid; grid-template-columns: 2fr 1.5fr 1fr;
            gap: 20px; align-items: center;
        }

        .input-box {
            border-bottom: 2px solid #000;
            display: flex; flex-direction: column;
        }

        .input-box label {
            font-size: 14px; font-weight: 800; color: #d4af37;
            text-transform: uppercase; margin-bottom: 5px;
        }

        .input-box span { height: 25px; display: block; }

        .order-section {
            margin-top: 15px;
            border: 1px solid #eee;
            background: #fafafa;
            padding: 10px;
            position: relative;
        }

        .order-section::after {
            content: "DETAILS / الطلبات";
            position: absolute; top: -10px; left: 15px;
            background: #000; color: #fff;
            font-size: 11px; padding: 2px 10px; font-weight: bold;
        }

        .writing-lines div {
            height: 35px; border-bottom: 1px solid #e0e0e0;
        }

        .card-footer {
            display: flex; justify-content: flex-end; align-items: center;
            margin-top: 10px;
        }

        .table-badge {
            display: flex; align-items: center; gap: 10px;
        }

        .table-badge b { font-size: 18px; color: #000; }

        .table-number {
            width: 70px; height: 45px;
            border: 3px solid #d4af37;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900;
        }

    </style>
</head>
<body>

<div class="paper-canvas">

        <div class="header-info">

    </div>
</div>

</html>
