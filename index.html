<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نموذج حجز رمضان - Black Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        :root {
            --main-black: #000000;
            --gold-detail: #c5a059;
            --pure-white: #ffffff;
        }

        body {
            background-color: #f0f0f0;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* حاوية الورقة مع الحواف السوداء العريضة */
        .page-frame {
            width: 210mm;
            min-height: 297mm;
            background: var(--pure-white);
            padding: 45px;
            box-sizing: border-box;
            border: 20px solid var(--main-black); /* الحواف السوداء */
            outline: 2px solid var(--gold-detail);
            outline-offset: -12px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--main-black);
            padding-bottom: 25px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 55px;
            color: var(--main-black);
            margin: 0;
            letter-spacing: 2px;
        }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 15px;
        }

        .meta-info div {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold-detail);
        }

        .meta-info span {
            color: #ddd;
            margin-right: 10px;
        }

        /* كروت الحجز */
        .booking-section {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .card {
            border: 2px solid #eee;
            padding: 30px;
            position: relative;
            background: #fff;
        }

        /* الشريط الجانبي الأسود لكل كارت */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 15px;
            background: var(--main-black);
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .label {
            font-weight: 800;
            font-size: 20px;
            color: var(--main-black);
            min-width: 160px;
        }

        .underline {
            flex-grow: 1;
            border-bottom: 2px solid #333;
            height: 25px;
            margin-right: 10px;
        }

        /* منطقة الأوردر الكبيرة */
        .order-container {
            margin-top: 30px;
            border: 1px solid #000;
            padding: 20px;
            position: relative;
        }

        .order-label {
            position: absolute;
            top: -15px;
            right: 20px;
            background: white;
            padding: 0 10px;
            font-weight: bold;
            color: var(--main-black);
            font-size: 18px;
        }

        .order-lines div {
            height: 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* الفوتر (الترابيزة) */
        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
        }

        .table-title {
            font-weight: 900;
            font-size: 24px;
            margin-left: 20px;
        }

        .table-box {
            width: 90px;
            height: 60px;
            border: 4px solid var(--main-black);
            border-radius: 4px;
        }

        /* أيقونة رمضانية هادئة */
        .moon-logo {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 40px;
            color: var(--gold-detail);
        }

        @media print {
            body { background: none; padding: 0; }
            .page-frame { margin: 0; border-width: 25px; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="page-frame">
    <div class="moon-logo">🌙</div>
    
    <header>
        <h1> حجوزات رمضان</h1>
        <div class="meta-info">
            <div>اليوم: <span>..................</span></div>
            <div>التاريخ: <span>..................</span></div>
        </div>
    </header>

    <div class="booking-section">
        <div class="card">
            <div class="input-group">
                <span class="label">الاســـــم /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">رقم الموبايل /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">عدد الأفراد /</span>
                <div class="underline"></div>
            </div>

            <div class="order-container">
                <span class="order-label">تـفاصيل الاوردر /</span>
                <div class="order-lines">
                    <div></div><div></div><div></div><div></div><div></div>
                </div>
            </div>

            <div class="card-footer">
                <span class="table-title">رقم الترابيزة //</span>
                <div class="table-box"></div>
            </div>
        </div>

        <div class="card">
            <div class="input-group">
                <span class="label">الاســـــم /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">رقم الموبايل /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">عدد الأفراد /</span>
                <div class="underline"></div>
            </div>

            <div class="order-container">
                <span class="order-label">تـفاصيل الاوردر /</span>
                <div class="order-lines">
                    <div></div><div></div><div></div><div></div><div></div>
                </div>
            </div>

            <div class="card-footer">
                <span class="table-title">رقم الترابيزة //</span>
                <div class="table-box"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
