<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر حجوزات رمضان - Full Page Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* إعدادات الصفحة للطباعة لضمان العرض الكامل */
        @page {
            size: A4;
            margin: 0; /* إلغاء هوامش المتصفح الافتراضية */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* الحاوية الرئيسية تأخذ عرض الورقة بالكامل */
        .page-frame {
            width: 210mm;
            min-height: 297mm;
            background: #ffffff;
            padding: 40px; /* مساحة داخلية */
            box-sizing: border-box;
            border: 25px solid #000000; /* الحواف السوداء العريضة */
            outline: 2px solid #c5a059;
            outline-offset: -12px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #000;
            padding-bottom: 20px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 50px;
            color: #000;
            margin: 0;
        }

        .meta-info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .booking-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            border: 1px solid #eee;
            padding: 25px;
            position: relative;
            background: #fff;
            border-right: 15px solid #000; /* شريط جانبي أسود */
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .label {
            font-weight: 800;
            font-size: 20px;
            color: #000;
            min-width: 140px;
        }

        .underline {
            flex-grow: 1;
            border-bottom: 2px solid #333;
            height: 25px;
        }

        .order-container {
            margin-top: 20px;
            border: 2px solid #000;
            padding: 15px;
        }

        .order-label {
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
            display: block;
        }

        .order-lines div {
            height: 38px;
            border-bottom: 1px solid #e0e0e0;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 20px;
        }

        .table-box {
            width: 80px;
            height: 50px;
            border: 4px solid #000;
            margin-right: 10px;
        }

        /* لضمان العرض الكامل عند التحويل لـ PDF */
        @media print {
            body { background: none; }
            .page-frame {
                width: 210mm;
                height: 297mm;
                border-width: 25px !important;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

<div class="page-frame">
    <header>
        <h1>دفتر حجوزات رمضان</h1>
        <div class="meta-info">
            <div>اليوم: ....................</div>
            <div>التاريخ: ....................</div>
        </div>
    </header>

    <div class="booking-section">
        <div class="card">
            <div class="input-group">
                <span class="label">الاســـــم /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">رقم الموبايل /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">عدد الأفراد /</span>
                <div class="underline"></div>
            </div>

            <div class="order-container">
                <span class="order-label">تـفاصيل الاوردر /</span>
                <div class="order-lines">
                    <div></div><div></div><div></div><div></div>
                </div>
            </div>

            <div class="card-footer">
                <span class="label">رقم الترابيزة //</span>
                <div class="table-box"></div>
            </div>
        </div>

        <div class="card">
            <div class="input-group">
                <span class="label">الاســـــم /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">رقم الموبايل /</span>
                <div class="underline"></div>
            </div>
            <div class="input-group">
                <span class="label">عدد الأفراد /</span>
                <div class="underline"></div>
            </div>

            <div class="order-container">
                <span class="order-label">تـفاصيل الاوردر /</span>
                <div class="order-lines">
                    <div></div><div></div><div></div><div></div>
                </div>
            </div>

            <div class="card-footer">
                <span class="label">رقم الترابيزة //</span>
                <div class="table-box"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
